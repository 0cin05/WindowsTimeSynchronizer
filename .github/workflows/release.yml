name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: build single .exe
        run: >
          dotnet publish WindowsTimeSynchronizer/WindowsTimeSynchronizer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -o publish
 
      - name: create release and attach .exe
        uses: softprops/action-gh-release@v2
        with:
          files: publish/WindowsTimeSynchronizer.exe
